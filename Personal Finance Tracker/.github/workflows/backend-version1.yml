name: Backend Version1 Build And Deploy

on:
  push:
    branches:
      - version1
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build Spring Boot backend
        # This matches your folder: backand/financeTracker
        working-directory: backand/financeTracker
        run: mvn clean package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: financeTracker-backend
          # Maven generates the JAR inside the target folder of the working directory
          path: backand/financeTracker/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Only runs if you have set up your GitHub Secrets
    if: ${{ secrets.AZURE_WEBAPP_NAME != '' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: financeTracker-backend
          path: ./deploy-folder

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          # Deploy the JAR found in the download path
          package: './deploy-folder/*.jar'