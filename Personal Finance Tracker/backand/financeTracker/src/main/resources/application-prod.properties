# Project Name
spring.application.name=financeTracker
spring.config.import=optional:file:.env[.properties]

# ===============================
# DATABASE CONNECTION (PostgreSQL)
# ===============================
# Database settings must be provided by the deployment environment.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver


# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
# 'update' automatically creates/updates tables in Postgres based on your Java code
spring.jpa.hibernate.ddl-auto=update

# Shows the SQL queries in the console (very helpful for debugging)
spring.jpa.show-sql=false

# Standard dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# SERVER SETTINGS
# ===============================
# Default port is 8080. If your frontend needs a different port, you can change it here.
server.port=${SERVER_PORT:8080}
spring.devtools.restart.enabled=true
app.internal_api_key=${APP_INTERNAL_API_KEY:change-me-in-env}
app.backend.base_url=${APP_BACKEND_URL}
app.frontend.base_url=${APP_FRONTEND_URL}
app.cors.allowed_origins=${APP_ALLOWED_ORIGINS}

# ===============================
# AUTH / JWT / COOKIE
# ===============================
app.jwt.secret=${APP_JWT_SECRET:VGhpc0lzQUR1bW15SldUU2VjcmV0S2V5Rm9yTG9jYWxEZXZlbG9wbWVudDEyMzQ1Njc4OTA=}
app.jwt.expiration_ms=86400000
app.jwt.refresh_expiration_ms=604800000
app.auth.cookie_name=${APP_AUTH_COOKIE_NAME:finance_tracker_auth}
app.auth.refresh_cookie_name=${APP_AUTH_REFRESH_COOKIE_NAME:finance_tracker_refresh}
app.auth.cookie_secure=${APP_AUTH_COOKIE_SECURE:true}
app.auth.cookie_same_site=${APP_AUTH_COOKIE_SAME_SITE:None}
app.auth.reset_password_base_url=${APP_FRONTEND_URL}/reset-password
app.auth.google_success_redirect_url=${APP_FRONTEND_URL}/auth/google/callback
app.auth.google_failure_redirect_url=${APP_FRONTEND_URL}/login

# ===============================
# MAIL (replace app password later)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:replace-mail-username}
spring.mail.password=${MAIL_PASSWORD:replace-mail-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.support.issue_to_email=${APP_SUPPORT_ISSUE_TO_EMAIL:replace-issue-to-email}
logging.level.com.example.financeTracker.AOP.Report=warn
logging.level.com.example.financeTracker.ServiceImpl.ReportServiceImpl=warn
logging.level.com.example.financeTracker.controller.ReportController=warn

# ===============================
# GOOGLE LOGIN
# ===============================




spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:replace-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:replace-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
