name: Build and deploy JAR app to Azure Web App - finance-backand

on:
  push:
    branches:
      - version1
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: 'maven'

      - name: Build with Maven
        working-directory: "Personal Finance Tracker/backand/financeTracker"
        run: mvn clean install -DskipTests

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: "Personal Finance Tracker/backand/financeTracker/target/*.jar"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    
    # FIX: 'steps' must be aligned with 'permissions' and 'needs'
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'finance-backand'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '*.jar'
